---
layout: default
---

<div class="post">

  <article>
    <div class="profile-layout">
      {% include sidebar.html %}

      <div class="profile-main">
        <div class="clearfix">
          {{ content }}
        </div>

        {% if page.news %}
          {% include news.html %}
        {% endif %}

        {% if page.selected_papers %}
          {% include selected_papers.html %}
        {% endif %}

        {% if page.social %}
        <div class="social">
          <div class="contact-icons">
            {% include social.html %}
          </div>
          <div class="contact-note">{{ site.contact_note }}</div>
        </div>
        {% endif %}
      </div>
    </div>
  </article>
</div>
