---
layout: default
---
<div class="post">

  <article>
    <div class="profile-layout">
      {% include sidebar.html %}

      <div class="profile-main">
        <header class="post-header">
          <h1 class="post-title">{{ page.title }}</h1>
          {% if page.description %}
            <p class="post-description">{{ page.description }}</p>
          {% endif %}
        </header>

        {{ content }}
      </div>
    </div>
  </article>

</div>
